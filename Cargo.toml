[workspace]
members = [
    "program",
    "test-programs/*",
    "verify",
]
resolver = "2"

[workspace.package]
authors = ["Joe Caulfield <jcaulfield135@gmail.com>"]
repository = "https://github.com/buffalojoec/invoke"
license = "Apache-2.0"
edition = "2021"

[workspace.dependencies]
bincode = "1.3.3"
mollusk-svm = "=0.0.13-solana-2.0"
num-derive = "0.4"
num-traits = "0.2"
solana-program = "2.0.9"
solana-sdk = "2.0.9"
thiserror = "1.0.64"
